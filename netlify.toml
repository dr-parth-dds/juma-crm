[build]
  publish = "public"
  functions = "netlify/functions"

[dev]
  port = 8888
  targetPort = 3000

# -- Security headers on all routes --
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation()"
    Content-Security-Policy = """
  default-src 'self';
  script-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
  style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com;
  font-src https://fonts.gstatic.com;
  connect-src 'self' https://*.netlify.app https://accounts.google.com https://maps.googleapis.com https://npiregistry.cms.hhs.gov;
  img-src 'self' data:;
  frame-src 'none';
  """

# -- API proxy routes -> Netlify Functions --
[[redirects]]
  from = "/api/ai"
  to = "/.netlify/functions/ai"
  status = 200

[[redirects]]
  from = "/api/airtable/*"
  to = "/.netlify/functions/airtable/:splat"
  status = 200

[[redirects]]
  from = "/api/gmail/*"
  to = "/.netlify/functions/gmail/:splat"
  status = 200

[[redirects]]
  from = "/api/enrich/*"
  to = "/.netlify/functions/enrich/:splat"
  status = 200

[[redirects]]
  from = "/api/provider-search/*"
  to = "/.netlify/functions/provider-search/:splat"
  status = 200

# -- SPA fallback --
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200[build]
